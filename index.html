<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Postal - Fleet Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 0;
        }

        .header {
            background: white;
            padding: 15px 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 30px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .main-menu {
            display: flex;
            gap: 15px;
            flex: 1;
        }

        .menu-btn {
            flex: 1;
            background: white;
            border: 2px solid #1e3c72;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #1e3c72;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .menu-btn.active {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .dashboard-container {
            background: white;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .route-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .route-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .route-visual {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            position: relative;
        }

        .truck-icon {
            font-size: 40px;
            position: absolute;
            z-index: 100;
            top: -20px;
        }

        .truck-icon.truck-right {
            transform: scaleX(-1);
            left: 0;
        }

        .truck-icon.truck-left {
            transform: scaleX(1);
            right: 0;
        }

        .volume-bar {
            flex: 1;
            height: 60px;
            background: linear-gradient(90deg, #C0C0C0, #D3D3D3);
            border-radius: 20px;
            overflow: visible;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 50%, calc(100% - 30px) 100%, 0 100%);
        }

        .volume-bar.arrow-left {
            clip-path: polygon(30px 0, 100% 0, 100% 100%, 30px 100%, 0 50%);
        }

        .volume-fill {
            height: 100%;
            display: flex;
            transition: width 0.5s ease;
            position: relative;
        }

        .postal-volume {
            background: linear-gradient(90deg, #FF8C42, #FFA500);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 16px;
        }

        .non-postal-volume {
            background: linear-gradient(90deg, #4ECDC4, #44A08D);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 16px;
        }

        .space-volume {
            background: linear-gradient(90deg, #C0C0C0, #D3D3D3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 16px;
        }

        .volume-legend {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 16px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 30px;
            height: 18px;
            border-radius: 4px;
        }

        .legend-postal {
            background: linear-gradient(90deg, #FF8C42, #FFA500);
        }

        .legend-non-postal {
            background: linear-gradient(90deg, #4ECDC4, #44A08D);
        }

        .legend-space {
            background: linear-gradient(90deg, #C0C0C0, #D3D3D3);
        }

        .notice {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">Dashboard Postal</h1>
        <div class="main-menu">
            <button class="menu-btn active" onclick="selectMenu('primer')">📦 PRIMER</button>
            <button class="menu-btn" onclick="selectMenu('sekunder')">📦 SEKUNDER</button>
            <button class="menu-btn" onclick="selectMenu('tersier')">📦 TERSIER</button>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="notice">
            <strong>📢 Demo Version</strong><br>
            Ini adalah versi demo dengan data contoh. Untuk versi lengkap dengan upload Excel dan database, gunakan hosting Node.js seperti Railway atau Vercel.
        </div>

        <div id="routesContainer">
            <!-- Routes akan di-render di sini -->
        </div>
    </div>

    <script>
        // Data contoh hardcoded
        const routesData = [
            { name: 'Rute 1 JAT-SB', postal: 46774.63, nonPostal: 0, sisa: 16 },
            { name: 'Rute 1 SB-JAT', postal: 13924.52, nonPostal: 0, sisa: 75 },
            { name: 'Rute 2 JAT-YK', postal: 14041.34, nonPostal: 0, sisa: 75 },
            { name: 'Rute 2 YK-JAT', postal: 23792.74, nonPostal: 8, sisa: 58 },
            { name: 'Rute 3 JAT-MN', postal: 15143.56, nonPostal: 0, sisa: 78 },
            { name: 'Rute 3 MN-JAT', postal: 14633.26, nonPostal: 0, sisa: 79 },
            { name: 'Rute 4 JAT-PWT', postal: 31650.37, nonPostal: 0, sisa: 55 },
            { name: 'Rute 4 PWT-JAT', postal: 17719.77, nonPostal: 0, sisa: 75 }
        ];

        function selectMenu(category) {
            // Update active menu
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Re-render routes
            renderRoutes();
        }

        function renderRoutes() {
            const container = document.getElementById('routesContainer');
            let html = '';
            let i = 0;

            while (i < routesData.length) {
                const route1 = routesData[i];
                const route2 = routesData[i + 1];

                // Extract route number
                const match1 = route1.name.match(/^(Rute \d+[A-Z]?)\s/i);
                const routeKey1 = match1 ? match1[1] : route1.name;

                // Check if next route has same route number
                let isSamePair = false;
                if (route2) {
                    const match2 = route2.name.match(/^(Rute \d+[A-Z]?)\s/i);
                    const routeKey2 = match2 ? match2[1] : route2.name;
                    isSamePair = (routeKey1 === routeKey2);
                }

                html += `<div class="route-card">
                    <div class="route-header" style="display:flex; align-items:center; margin-bottom:15px;">
                        <div class="route-name" style="font-size:20px; font-weight:bold; color:#333;">${routeKey1}</div>
                    </div>`;

                // First route
                const sisaPct1 = Math.abs(route1.sisa);
                const usedPct1 = 100 - sisaPct1;
                const totalVolume1 = route1.postal + route1.nonPostal;
                let postal1Pct, nonPostal1Pct;

                if (totalVolume1 > 0) {
                    postal1Pct = Math.round((route1.postal / totalVolume1) * usedPct1);
                    nonPostal1Pct = Math.round((route1.nonPostal / totalVolume1) * usedPct1);
                } else {
                    postal1Pct = usedPct1;
                    nonPostal1Pct = 0;
                }

                if (route1.nonPostal > 0 && nonPostal1Pct === 0) {
                    nonPostal1Pct = 1;
                    if (postal1Pct > 0) postal1Pct = postal1Pct - 1;
                }

                const space1Pct = 100 - postal1Pct - nonPostal1Pct;

                html += `
                <div class="route-section">
                    <h4 style="color: #1e3c72; margin-bottom: 15px; font-size: 16px;">Arah: ${route1.name}</h4>
                    <div class="route-visual">
                        <div class="truck-icon truck-right">🚛</div>
                        <div class="volume-bar">
                            <div class="volume-fill">
                                <div class="postal-volume" style="width: ${postal1Pct}%;">
                                    ${postal1Pct >= 8 ? `${route1.postal.toLocaleString()} kg (${postal1Pct}%)` : ''}
                                </div>
                                ${nonPostal1Pct > 0 ? `<div class="non-postal-volume" style="width: ${nonPostal1Pct}%;">
                                    ${nonPostal1Pct >= 1 ? `${route1.nonPostal.toLocaleString()} kg (${nonPostal1Pct}%)` : ''}
                                </div>` : ''}
                                <div class="space-volume" style="width: ${space1Pct}%;">
                                    ${space1Pct >= 8 ? `${space1Pct}%` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="volume-legend">
                        <div class="legend-item">
                            <div class="legend-color legend-postal"></div>
                            <span>Postal</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color legend-non-postal"></div>
                            <span>Poslog</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color legend-space"></div>
                            <span>Space</span>
                        </div>
                    </div>
                </div>`;

                // Second route if same pair
                if (isSamePair && route2) {
                    const sisaPct2 = Math.abs(route2.sisa);
                    const usedPct2 = 100 - sisaPct2;
                    const totalVolume2 = route2.postal + route2.nonPostal;
                    let postal2Pct, nonPostal2Pct;

                    if (totalVolume2 > 0) {
                        postal2Pct = Math.round((route2.postal / totalVolume2) * usedPct2);
                        nonPostal2Pct = Math.round((route2.nonPostal / totalVolume2) * usedPct2);
                    } else {
                        postal2Pct = usedPct2;
                        nonPostal2Pct = 0;
                    }

                    if (route2.nonPostal > 0 && nonPostal2Pct === 0) {
                        nonPostal2Pct = 1;
                        if (postal2Pct > 0) postal2Pct = postal2Pct - 1;
                    }

                    const space2Pct = 100 - postal2Pct - nonPostal2Pct;

                    html += `
                    <div class="route-section">
                        <h4 style="color: #1e3c72; margin-bottom: 15px; font-size: 16px;">Arah: ${route2.name}</h4>
                        <div class="route-visual">
                            <div class="volume-bar arrow-left">
                                <div class="volume-fill">
                                    <div class="space-volume" style="width: ${space2Pct}%;">
                                        ${space2Pct >= 8 ? `${space2Pct}%` : ''}
                                    </div>
                                    ${nonPostal2Pct > 0 ? `<div class="non-postal-volume" style="width: ${nonPostal2Pct}%;">
                                        ${nonPostal2Pct >= 1 ? `${route2.nonPostal.toLocaleString()} kg (${nonPostal2Pct}%)` : ''}
                                    </div>` : ''}
                                    <div class="postal-volume" style="width: ${postal2Pct}%;">
                                        ${postal2Pct >= 8 ? `${route2.postal.toLocaleString()} kg (${postal2Pct}%)` : ''}
                                    </div>
                                </div>
                            </div>
                            <div class="truck-icon truck-left">🚛</div>
                        </div>
                        <div class="volume-legend">
                            <div class="legend-item">
                                <div class="legend-color legend-postal"></div>
                                <span>Postal</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color legend-non-postal"></div>
                                <span>Poslog</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color legend-space"></div>
                                <span>Space</span>
                            </div>
                        </div>
                    </div>`;
                    i += 2;
                } else {
                    i += 1;
                }

                html += `</div>`;
            }
            container.innerHTML = html;
        }

        // Initialize
        window.onload = function() {
            renderRoutes();
        };
    </script>
</body>
</html>
